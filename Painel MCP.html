<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>github-unified-mcp · painel</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { height: 100%; }
  #root { width: 100%; min-height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data/tools.jsx"></script>
<script type="text/babel" src="data/server-state.jsx"></script>
<script type="text/babel" src="data/schemas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screens/direction-a-drawer.jsx"></script>
<script type="text/babel" src="screens/direction-a-wizard.jsx"></script>
<script type="text/babel" src="screens/direction-a-playground.jsx"></script>
<script type="text/babel" src="screens/direction-a.jsx"></script>
<script type="text/babel" src="screens/direction-a-pr-ready.jsx"></script>
<script type="text/babel" src="screens/direction-b.jsx"></script>

<script type="text/babel">
const DEFAULTS = /*EDITMODE-BEGIN*/{
  "mode": "read_only",
  "density": "compact",
  "errorState": false,
  "serverUrl": "",
  "bearerToken": "",
  "view": "console"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = window.useTweaks ? window.useTweaks(DEFAULTS) : [DEFAULTS, () => {}];
  const ConsoleA = window.ConsoleA;
  const PanelB = window.PanelB;

  return (
    <>
      {tweaks.view === "calm" && PanelB
        ? <PanelB mode={tweaks.mode} />
        : ConsoleA
          ? <ConsoleA mode={tweaks.mode} density={tweaks.density} forceError={tweaks.errorState} serverUrl={tweaks.serverUrl} bearerToken={tweaks.bearerToken} />
          : <div style={{color:'var(--text)',padding:40,fontFamily:'monospace'}}>Carregando…</div>
      }

      {window.TweaksPanel && (
        <window.TweaksPanel>
          <window.TweakSection title="Servidor">
            <window.TweakText
              label="URL do servidor"
              value={tweaks.serverUrl}
              onChange={(v) => setTweak('serverUrl', v)}
              placeholder="https://seu-servidor.onrender.com"
              hint="Deixe vazio para modo demo com dados mock"
            />
            <window.TweakText
              label="Bearer token"
              value={tweaks.bearerToken}
              onChange={(v) => setTweak('bearerToken', v)}
              placeholder="mcp_..."
              hint="Necessário quando MCP_AUTH_MODE=bearer"
            />
            <window.TweakRadio
              label="Postura (demo)"
              value={tweaks.mode}
              onChange={(v) => setTweak('mode', v)}
              options={[
                { value: 'read_only', label: 'Read-only' },
                { value: 'write_safe', label: 'Write-safe' },
                { value: 'operator', label: 'Operador' },
              ]}
            />
            <window.TweakToggle
              label="Simular incidente"
              value={tweaks.errorState}
              onChange={(v) => setTweak('errorState', v)}
              hint="healthz=503, /oauth/token rate-limited"
            />
          </window.TweakSection>
          <window.TweakSection title="Aparência">
            <window.TweakRadio
              label="Layout"
              value={tweaks.view}
              onChange={(v) => setTweak('view', v)}
              options={[
                { value: 'console', label: 'Console' },
                { value: 'calm', label: 'Calm' },
              ]}
            />
            <window.TweakRadio
              label="Densidade"
              value={tweaks.density}
              onChange={(v) => setTweak('density', v)}
              options={[
                { value: 'compact', label: 'Compacta' },
                { value: 'comfortable', label: 'Confortável' },
              ]}
            />
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
