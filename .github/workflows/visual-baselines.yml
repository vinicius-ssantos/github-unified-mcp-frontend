name: Generate Visual Baselines

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  visual-baselines:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Generate visual baselines
        run: npm run test:visual:update
      - name: Create or update baseline pull request
        env:
          GH_TOKEN: ${{ github.token }}
          BASELINE_BRANCH: chore/update-visual-baselines
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BASELINE_BRANCH"

          git add tests/ui/**/console-visual.spec.ts-snapshots
          if git diff --cached --quiet; then
            echo "No visual baseline changes to commit."
            exit 0
          fi

          git commit -m "test: update visual regression baselines"
          git push --force-with-lease origin "$BASELINE_BRANCH"

          if gh pr view "$BASELINE_BRANCH" --json number --jq .number >/tmp/pr-number 2>/dev/null; then
            PR_NUMBER="$(cat /tmp/pr-number)"
            gh pr edit "$PR_NUMBER" \
              --title "test: update visual regression baselines" \
              --body "Generated by the **Generate Visual Baselines** workflow. Review the screenshot baseline PNGs before merging."
          else
            gh pr create \
              --base main \
              --head "$BASELINE_BRANCH" \
              --title "test: update visual regression baselines" \
              --body "Generated by the **Generate Visual Baselines** workflow. Review the screenshot baseline PNGs before merging."
          fi
      - name: Upload generated baselines
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: |
            tests/ui/**/console-visual.spec.ts-snapshots/**
            test-results/
            playwright-report/
          retention-days: 7
